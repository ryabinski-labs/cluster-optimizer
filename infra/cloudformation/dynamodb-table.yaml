AWSTemplateFormatVersion: "2010-09-09"
Description: DynamoDB table for Cluster Optimizer report history.
Parameters:
  TableName:
    Type: String
    Default: cluster-optimizer-reports
Resources:
  ClusterOptimizerReports:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref TableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Project
          Value: cluster-optimizer
Outputs:
  TableName:
    Value: !Ref ClusterOptimizerReports
  TableArn:
    Value: !GetAtt ClusterOptimizerReports.Arn
