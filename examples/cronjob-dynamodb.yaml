apiVersion: batch/v1
kind: CronJob
metadata:
  name: cluster-optimizer
  namespace: cluster-optimizer
spec:
  schedule: "*/30 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: cluster-optimizer
        spec:
          serviceAccountName: cluster-optimizer
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: optimizer
              image: ghcr.io/gipsychef/cluster-optimizer:latest
              imagePullPolicy: IfNotPresent
              args: ["--output", "json"]
              env:
                - name: CLUSTER_OPTIMIZER_CLUSTER_ID
                  value: "default"
                - name: DYNAMODB_TABLE
                  value: cluster-optimizer-reports
                - name: AWS_REGION
                  valueFrom:
                    secretKeyRef:
                      name: cluster-optimizer-aws
                      key: AWS_REGION
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: cluster-optimizer-aws
                      key: AWS_ACCESS_KEY_ID
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: cluster-optimizer-aws
                      key: AWS_SECRET_ACCESS_KEY
              resources:
                requests:
                  cpu: 1m
                  memory: 1Mi
                limits:
                  cpu: 100m
                  memory: 128Mi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
