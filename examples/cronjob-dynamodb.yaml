apiVersion: batch/v1
kind: CronJob
metadata:
  name: cluster-optimizer
  namespace: cluster-optimizer
spec:
  schedule: "*/30 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: cluster-optimizer
        spec:
          serviceAccountName: cluster-optimizer
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: optimizer
              image: ghcr.io/ryabinski-labs/cluster-optimizer:latest
              imagePullPolicy: IfNotPresent
              args: ["--output", "json", "--auto-apply", "--nudge", "--gc-completed-pods"]
              env:
                - name: CLUSTER_OPTIMIZER_CLUSTER_ID
                  value: "default"
                - name: DYNAMODB_TABLE
                  value: cluster-optimizer-reports
                - name: AWS_REGION
                  valueFrom:
                    secretKeyRef:
                      name: cluster-optimizer-aws
                      key: AWS_REGION
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: cluster-optimizer-aws
                      key: AWS_ACCESS_KEY_ID
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: cluster-optimizer-aws
                      key: AWS_SECRET_ACCESS_KEY
                - name: CLUSTER_OPTIMIZER_AUTOAPPLY
                  value: "true"
                - name: CLUSTER_OPTIMIZER_NUDGE_LIVE
                  value: "true"
                # Completed-pod cleanup runs (dry-run: logs what it would
                # delete) because --gc-completed-pods is in args above. Pod
                # deletion is harder to reverse than a request trim or cordon,
                # so the live gate is left off here. Uncomment to actually
                # delete completed pods.
                # - name: CLUSTER_OPTIMIZER_GC_COMPLETED_PODS_LIVE
                #   value: "true"
              volumeMounts:
                - name: targets
                  mountPath: /etc/cluster-optimizer
                  readOnly: true
              resources:
                requests:
                  cpu: 1m
                  memory: 1Mi
                limits:
                  cpu: 100m
                  memory: 128Mi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
          volumes:
            - name: targets
              configMap:
                name: cluster-optimizer-targets
