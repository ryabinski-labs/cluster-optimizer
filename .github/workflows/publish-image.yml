name: Publish Image

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: Optional extra image tag to publish.
        required: false
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/ryabinski-labs/cluster-optimizer

jobs:
  publish:
    name: Build and Push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Compute tags
        id: meta
        env:
          EXTRA_TAG: ${{ inputs.tag }}
        run: |
          {
            echo "tags<<EOF"
            echo "${IMAGE_NAME}:${GITHUB_SHA}"
            if [ "${GITHUB_REF_NAME}" = "main" ]; then
              echo "${IMAGE_NAME}:latest"
            fi
            if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
              echo "${IMAGE_NAME}:${GITHUB_REF_NAME}"
            fi
            if [ -n "${EXTRA_TAG}" ]; then
              echo "${IMAGE_NAME}:${EXTRA_TAG}"
            fi
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build image
        run: docker build --platform linux/amd64 -t "${IMAGE_NAME}:${GITHUB_SHA}" .

      - name: Push image tags
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          printf "%s\n" "${TAGS}" | while IFS= read -r tag; do
            test -n "${tag}" || continue
            if [ "${tag}" != "${IMAGE_NAME}:${GITHUB_SHA}" ]; then
              docker tag "${IMAGE_NAME}:${GITHUB_SHA}" "${tag}"
            fi
            docker push "${tag}"
          done
