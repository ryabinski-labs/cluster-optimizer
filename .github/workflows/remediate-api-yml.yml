name: Remediate api.yml

on:
  workflow_dispatch:
    inputs:
      cluster_id:
        description: Cluster identifier that produced the recommendation.
        required: true
        type: string
      rule_id:
        description: Recommendation rule id.
        required: true
        type: string
      namespace:
        description: Kubernetes namespace.
        required: true
        type: string
      workload:
        description: Workload in Kind/name form.
        required: true
        type: string
      repository:
        description: Target repository, for example ryabinski-labs/echothread.
        required: true
        type: string
      manifest_path:
        description: api.yml path in the target repository.
        required: true
        type: string
      container:
        description: Container name for resource request changes.
        required: false
        type: string
      target_cpu:
        description: Optional target CPU request.
        required: false
        type: string
      target_memory:
        description: Optional target memory request.
        required: false
        type: string
      context_json:
        description: JSON context with recommendation, evidence, observed_days, and occurrences.
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  remediate:
    name: Create api.yml PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout optimizer
        uses: actions/checkout@v7
        with:
          path: optimizer

      - name: Checkout target repository
        uses: actions/checkout@v7
        with:
          repository: ${{ inputs.repository }}
          token: ${{ secrets.REMEDIATION_GITHUB_TOKEN }}
          path: target

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: optimizer/go.mod
          cache-dependency-path: optimizer/go.sum

      - name: Patch api.yml
        working-directory: optimizer
        run: |
          go run ./cmd/api-yml-remediator \
            --file "../target/${{ inputs.manifest_path }}" \
            --workload "${{ inputs.workload }}" \
            --container "${{ inputs.container }}" \
            --rule-id "${{ inputs.rule_id }}" \
            --cpu-request "${{ inputs.target_cpu }}" \
            --memory-request "${{ inputs.target_memory }}"

      - name: Create pull request
        working-directory: target
        env:
          GH_TOKEN: ${{ secrets.REMEDIATION_GITHUB_TOKEN }}
          TARGET_REPOSITORY: ${{ inputs.repository }}
          RULE_ID: ${{ inputs.rule_id }}
          WORKLOAD: ${{ inputs.workload }}
          NAMESPACE: ${{ inputs.namespace }}
          CONTEXT_JSON: ${{ inputs.context_json }}
        run: |
          branch="cluster-optimizer/${RULE_ID}-${GITHUB_RUN_ID}"
          git config user.name "cluster-optimizer"
          git config user.email "cluster-optimizer@users.noreply.github.com"
          git checkout -b "${branch}"
          git add "${{ inputs.manifest_path }}"
          git diff --cached --quiet && {
            echo "No api.yml changes produced."
            exit 1
          }
          git commit -m "Tune ${WORKLOAD} from cluster optimizer"
          git push --set-upstream origin "${branch}"
          {
            echo "Cluster Optimizer observed a persistent recommendation and generated this api.yml patch."
            echo
            echo "- Namespace: ${NAMESPACE}"
            echo "- Workload: ${WORKLOAD}"
            echo "- Rule: ${RULE_ID}"
            echo "- Context:"
            echo
            echo '```json'
            printf '%s\n' "${CONTEXT_JSON}"
            echo '```'
            echo
            echo "Validate rollout metrics before merging: pod restarts, OOMKilled events, latency, CPU throttling, and node bin-packing."
          } > /tmp/cluster-optimizer-pr-body.md
          gh pr create \
            --repo "${TARGET_REPOSITORY}" \
            --base main \
            --head "${branch}" \
            --title "Tune ${WORKLOAD} from cluster optimizer" \
            --body-file /tmp/cluster-optimizer-pr-body.md
