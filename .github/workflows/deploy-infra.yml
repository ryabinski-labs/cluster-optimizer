name: Deploy AWS Infra

on:
  workflow_dispatch:
    inputs:
      table_name:
        description: DynamoDB table name for report history.
        default: cluster-optimizer-reports
        required: true
        type: string
      policy_name:
        description: IAM managed policy name for DynamoDB writer access.
        default: cluster-optimizer-dynamodb-writer
        required: true
        type: string

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy DynamoDB and IAM
    runs-on: self-hosted
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ACCESS_KEY_ID: ${{ secrets.MX1_AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.MX1_AWS_SECRET_ACCESS_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate inputs
        run: |
          test -n "${AWS_REGION}" || {
            echo "AWS_REGION repository variable is required."
            exit 1
          }
          test -n "${AWS_ACCESS_KEY_ID}" || {
            echo "MX1_AWS_ACCESS_KEY_ID repository secret is required."
            exit 1
          }
          test -n "${AWS_SECRET_ACCESS_KEY}" || {
            echo "MX1_AWS_SECRET_ACCESS_KEY repository secret is required."
            exit 1
          }
          aws sts get-caller-identity

      - name: Deploy DynamoDB table
        run: |
          aws cloudformation deploy \
            --stack-name cluster-optimizer-dynamodb \
            --template-file infra/cloudformation/dynamodb-table.yaml \
            --parameter-overrides TableName=${{ inputs.table_name }}

      - name: Deploy DynamoDB writer policy
        run: |
          aws cloudformation deploy \
            --stack-name cluster-optimizer-dynamodb-writer-policy \
            --template-file infra/cloudformation/dynamodb-writer-policy.yaml \
            --parameter-overrides TableName=${{ inputs.table_name }} PolicyName=${{ inputs.policy_name }} \
            --capabilities CAPABILITY_NAMED_IAM

      - name: Show outputs
        run: |
          aws cloudformation describe-stacks \
            --stack-name cluster-optimizer-dynamodb \
            --query "Stacks[0].Outputs"
          aws cloudformation describe-stacks \
            --stack-name cluster-optimizer-dynamodb-writer-policy \
            --query "Stacks[0].Outputs"
