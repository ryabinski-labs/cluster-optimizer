version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    groups:
      kubernetes:
        patterns:
          - k8s.io/*
    ignore:
      # Kubernetes 0.36 removed API packages still used for compatibility
      # with older clusters, including autoscaling/v2beta* and scheduling/v1alpha1.
      - dependency-name: k8s.io/api
        versions:
          - ">= 0.36.0"
      - dependency-name: k8s.io/apimachinery
        versions:
          - ">= 0.36.0"
      - dependency-name: k8s.io/client-go
        versions:
          - ">= 0.36.0"

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 1

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
    groups:
      github-actions:
        patterns:
          - "*"
