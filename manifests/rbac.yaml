apiVersion: v1
kind: Namespace
metadata:
  name: cluster-optimizer
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cluster-optimizer
  namespace: cluster-optimizer
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  # Renamed from cluster-optimizer-readonly: the role is no longer read-only
  # (it grants update nodes, create pods/eviction, delete pods, and patch
  # workloads for the opt-in remediation paths). scripts/apply-rbac.sh removes
  # the old objects so a renamed apply does not orphan them.
  name: cluster-optimizer-engine
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch", "update"]
  - apiGroups: [""]
    resources: ["pods"]
    # "delete" is required only for the opt-in completed-pod GC
    # (--gc-completed-pods); it stays dry-run unless the live gate is set.
    verbs: ["get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods/eviction"]
    verbs: ["create"]
  - apiGroups: [""]
    # nodes/proxy is read-only here: it lets the collector fetch each node's
    # kubelet stats/summary (root disk + image filesystem usage) that powers
    # the node-disk-utilization-high finding. No mutation.
    resources: ["nodes/proxy"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["services", "persistentvolumes", "persistentvolumeclaims", "events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets", "replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cluster-optimizer-engine
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-optimizer-engine
subjects:
  - kind: ServiceAccount
    name: cluster-optimizer
    namespace: cluster-optimizer

